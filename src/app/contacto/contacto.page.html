<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-text color="medium">
    <p>¿Tienes alguna duda sobre mi proyecto? Envíame un mensaje utilizando el siguiente formulario.</p>
  </ion-text>

  <!-- Utilizo ngModel para conectar estos inputs directamente a mi lógica en TypeScript -->
  <ion-list>
    <ion-item>
      <ion-input label="Asunto" labelPlacement="floating" placeholder="Motivo de contacto" [(ngModel)]="formularioContacto.asunto"></ion-input>
    </ion-item>

    <ion-item>
      <ion-textarea label="Mensaje" labelPlacement="floating" placeholder="Escribe tu mensaje aquí..." [(ngModel)]="formularioContacto.mensaje" [autoGrow]="true"></ion-textarea>
    </ion-item>
  </ion-list>

  <ion-button expand="block" class="ion-margin-top" (click)="enviarMensaje()">
    <ion-icon slot="start" name="send-outline"></ion-icon>
    Enviar Mensaje
  </ion-button>
</ion-content>
