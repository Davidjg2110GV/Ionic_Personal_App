<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="heading-serif">Contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="contact-page">

    <!-- Encabezado de la sección -->
    <div class="contact-header">
      <div class="contact-icon-wrapper">
        <ion-icon name="chatbubbles-outline"></ion-icon>
      </div>
      <h2 class="heading-serif">¡Hablemos!</h2>
      <p>¿Tienes alguna duda sobre mi proyecto? Envíame un mensaje utilizando el siguiente formulario.</p>
    </div>

    <!-- Formulario dentro de tarjeta blanca -->
    <div class="contact-card">

      <div class="form-group">
        <label class="form-label">Nombre</label>
        <div class="input-wrapper">
          <ion-icon name="person-outline" class="input-icon"></ion-icon>
          <input type="text" placeholder="Tu nombre completo" [(ngModel)]="formularioContacto.nombre" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrapper">
          <ion-icon name="mail-outline" class="input-icon"></ion-icon>
          <input type="email" placeholder="correo@ejemplo.com" [(ngModel)]="formularioContacto.email" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Asunto</label>
        <div class="input-wrapper">
          <ion-icon name="document-text-outline" class="input-icon"></ion-icon>
          <input type="text" placeholder="Motivo de contacto" [(ngModel)]="formularioContacto.asunto" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Mensaje</label>
        <div class="input-wrapper textarea-wrapper">
          <ion-icon name="create-outline" class="input-icon"></ion-icon>
          <textarea placeholder="Escribe tu mensaje aquí..." [(ngModel)]="formularioContacto.mensaje" rows="4"></textarea>
        </div>
      </div>

      <!-- Botón de envío con el estilo coral del diseño -->
      <button class="send-button" (click)="enviarMensaje()">
        <ion-icon name="send-outline"></ion-icon>
        Enviar Mensaje
      </button>

    </div>

    <!-- Info de contacto adicional -->
    <div class="contact-info-row">
      <div class="contact-info-item">
        <ion-icon name="location-outline"></ion-icon>
        <span>Venezuela</span>
      </div>
      <div class="contact-info-item">
        <ion-icon name="school-outline"></ion-icon>
        <span>UNETI</span>
      </div>
    </div>

  </div>
</ion-content>
