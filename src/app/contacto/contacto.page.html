<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="heading-royal text-gold">Contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Grid responsivo: en móvil ocupa el 100%, en PC se centra y limita el ancho -->
  <ion-grid fixed>
    <ion-row class="ion-justify-content-center">
      <ion-col size="12" size-md="8" size-lg="6">

        <!-- ============================================================
             HERO DE CONTACTO
             Sección tipo "banner" con el nombre del profesional y su cargo.
             Sirve como presentación antes de los canales de comunicación.
             ============================================================ -->
        <div class="contact-hero">
          <h1 class="contact-name heading-royal text-gold">David Gonzalez</h1>
          <p class="contact-role">Ingeniero en Sistemas</p>
          <p class="contact-subtitle">Disponible para proyectos y colaboraciones</p>
        </div>

        <!-- ============================================================
             CANALES DE CONTACTO PROFESIONAL
             Botones de acción directa hacia las redes y el correo.
             Cada botón redirige al canal correspondiente con target="_blank"
             para que se abra en una nueva pestaña sin cerrar la app.
             ============================================================ -->
        <div class="social-links-section">
          <a href="https://www.linkedin.com/in/david-gonzalez" target="_blank" class="social-link-btn linkedin-btn">
            <ion-icon name="logo-linkedin"></ion-icon>
            <span>Conectar en LinkedIn</span>
          </a>
          <a href="https://github.com/Davidjg2110GV" target="_blank" class="social-link-btn github-btn">
            <ion-icon name="logo-github"></ion-icon>
            <span>Ver en GitHub</span>
          </a>
          <a href="mailto:davidjg2110gv@gmail.com" class="social-link-btn email-btn">
            <ion-icon name="mail-outline"></ion-icon>
            <span>Enviar Email</span>
          </a>
        </div>

        <!-- ============================================================
             FORMULARIO DE CONTACTO
             Tarjeta con glassmorphism para enviar mensajes directos.
             Cada campo usa [(ngModel)] para binding bidireccional,
             permitiendo capturar los datos desde el componente TypeScript.
             ============================================================ -->
        <div class="contact-card">
          <div class="form-header">
            <h3 class="heading-serif">Envíame un Mensaje</h3>
            <p>Completa el formulario y me pondré en contacto contigo.</p>
          </div>

          <div class="form-group">
            <label class="form-label">Nombre</label>
            <div class="input-wrapper">
              <ion-icon name="person-outline" class="input-icon"></ion-icon>
              <input type="text" placeholder="Tu nombre completo" [(ngModel)]="formularioContacto.nombre" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <div class="input-wrapper">
              <ion-icon name="mail-outline" class="input-icon"></ion-icon>
              <input type="email" placeholder="correo@ejemplo.com" [(ngModel)]="formularioContacto.email" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Asunto</label>
            <div class="input-wrapper">
              <ion-icon name="document-text-outline" class="input-icon"></ion-icon>
              <input type="text" placeholder="Motivo de contacto" [(ngModel)]="formularioContacto.asunto" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Mensaje</label>
            <div class="input-wrapper textarea-wrapper">
              <ion-icon name="create-outline" class="input-icon"></ion-icon>
              <textarea placeholder="Escribe tu mensaje aquí..." [(ngModel)]="formularioContacto.mensaje" rows="5"></textarea>
            </div>
          </div>

          <!-- Botón de envío con gradiente azul marino acorde al tema -->
          <button class="send-button" (click)="enviarMensaje()">
            <ion-icon name="send-outline"></ion-icon>
            Enviar Mensaje
          </button>
        </div>

        <!-- ============================================================
             INFORMACIÓN ADICIONAL (FOOTER)
             Datos de ubicación y universidad como refuerzo de credibilidad.
             ============================================================ -->
        <div class="contact-footer">
          <div class="contact-info-row">
            <div class="contact-info-item">
              <ion-icon name="location-outline"></ion-icon>
              <span>Venezuela</span>
            </div>
            <div class="contact-info-item">
              <ion-icon name="school-outline"></ion-icon>
              <span>UNETI</span>
            </div>
            <div class="contact-info-item">
              <ion-icon name="calendar-outline"></ion-icon>
              <span>2025</span>
            </div>
          </div>
          <p class="footer-text">Desarrollado con Ionic & Angular</p>
        </div>

      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
