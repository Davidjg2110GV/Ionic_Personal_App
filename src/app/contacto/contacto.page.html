<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="heading-serif" style="color: #bec6e0; font-size: 20px; font-style: normal;">Contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-grid fixed>
    <ion-row class="ion-justify-content-center">
      <ion-col size="12" size-md="8" size-lg="6">

        <!-- Hero: name and role -->
        <div class="contact-hero animate-fade-in-up">
          <h1 class="contact-name font-script text-gold">David Gonzalez</h1>
          <p class="contact-role">Ingeniero en Sistemas</p>
          <p class="contact-subtitle">Disponible para proyectos y colaboraciones</p>
        </div>

        <!-- Social link buttons -->
        <div class="social-links-section">
          <a href="https://linkedin.com/in/david-gonzalez-827301a8" target="_blank" class="social-link-btn animate-fade-in-up delay-100">
            <ion-icon name="logo-linkedin"></ion-icon>
            <span>Conectar en LinkedIn</span>
          </a>
          <a href="https://github.com/Davidjg2110GV" target="_blank" class="social-link-btn animate-fade-in-up delay-200">
            <ion-icon name="logo-github"></ion-icon>
            <span>Ver en GitHub</span>
          </a>
          <a href="mailto:gonzalezvillegasdavid@gmail.com?subject=Contacto%20desde%20Portafolio&body=Hola%20David%2C%20te%20contacto%20desde%20tu%20portafolio%20profesional." class="social-link-btn animate-fade-in-up delay-300">
            <ion-icon name="mail-outline"></ion-icon>
            <span>Enviar Email</span>
          </a>
        </div>

        <!-- Footer info -->
        <div class="contact-footer animate-fade-in-up delay-400">
          <div class="contact-info-row">
            <div class="contact-info-item">
              <ion-icon name="location-outline"></ion-icon>
              <span>Venezuela</span>
            </div>
            <div class="contact-info-item">
              <ion-icon name="school-outline"></ion-icon>
              <span>UNETI</span>
            </div>
            <div class="contact-info-item">
              <ion-icon name="calendar-outline"></ion-icon>
              <span>2025</span>
            </div>
          </div>
          <p class="footer-text">Desarrollado con Ionic & Angular</p>
        </div>

      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
