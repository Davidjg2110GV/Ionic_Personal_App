<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Información Personal</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="perfil-container ion-text-center">
    <ion-avatar style="width: 150px; height: 150px; margin: 0 auto 10px;">
      <img src="https://i.ibb.co/ZzphLGyc/IMG-20251204-070842-288.jpg" alt="Avatar estudiante" />
    </ion-avatar>
  </div>

  <ion-list>
    <ion-item>
      <ion-icon name="person-outline" slot="start"></ion-icon>
      <ion-label>
        <h3>Nombre</h3>
        <p>{{ misDatos.nombre }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="card-outline" slot="start"></ion-icon>
      <ion-label>
        <h3>Cédula</h3>
        <p>{{ misDatos.cedula }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="school-outline" slot="start"></ion-icon>
      <ion-label>
        <h3>Carrera</h3>
        <p>{{ misDatos.carrera }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="business-outline" slot="start"></ion-icon>
      <ion-label>
        <h3>Institución</h3>
        <p class="ion-text-wrap">{{ misDatos.universidad }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
